name: POS Ingestion Pipeline

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  test-and-ingest:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: rubis_user
          POSTGRES_PASSWORD: rubis2024
          POSTGRES_DB: rubis_pos
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install pytest
        run: pip install pytest

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply database schema
        env:
          PGPASSWORD: rubis2024
        run: |
          echo "=== Testing database connection ==="
          psql -h localhost -U rubis_user -d rubis_pos -c "SELECT 1" || exit 1
          
          echo "=== Applying schema ==="
          psql -h localhost -U rubis_user -d rubis_pos -f database/schema.sql -v ON_ERROR_STOP=1
          
          echo "=== Verifying tables ==="
          psql -h localhost -U rubis_user -d rubis_pos -c "\dt"
          
          echo "=== Verifying unique constraint ==="
          psql -h localhost -U rubis_user -d rubis_pos -c "\d pos_sales" | grep -A10 "Indexes"

      - name: Run tests
        run: pytest tests/ -v

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run ingestion pipeline
        env:
          POS_URL: ${{ secrets.POS_URL }}
          POS_USER: ${{ secrets.POS_USER }}
          POS_PASS: ${{ secrets.POS_PASS }}
          DB_URL: postgresql://rubis_user:rubis2024@localhost:5432/rubis_pos
        run: python ingestion/pipeline.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs
          path: logs/

      - name: Send failure alert
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: 'ALERT: Rubis POS Ingestion FAILED'
          body: |
            The daily ingestion pipeline failed.
            Check logs at: ${{ github.server_url }}/${{ github.repository }}/actions
          to: bernicewakarindi@gmail.com
          from: Rubis Pipeline Bot