name: POS Ingestion Pipeline

on:
  schedule:
    - cron: '0 3 * * *'   # Runs daily at 6AM Nairobi time (03:00 UTC)
  workflow_dispatch:        # Allows manual trigger from GitHub UI
  push:
    branches: [main]        # Runs tests on every code push

jobs:
  test-and-ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests         # Tests must pass before pipeline runs
        run: pytest tests/ -v

      - name: Set up Chrome     # Needed for Selenium scraper
        uses: browser-actions/setup-chrome@v1

      - name: Run ingestion pipeline
        env:
          POS_URL: ${{ secrets.POS_URL }}
          POS_USER: ${{ secrets.POS_USER }}
          POS_PASS: ${{ secrets.POS_PASS }}
          DB_URL: ${{ secrets.DB_URL }}
        run: python ingestion/pipeline.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs
          path: logs/